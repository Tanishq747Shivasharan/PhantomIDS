<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhantomIDS — Admin Login</title>
  <meta name="description" content="PhantomIDS Security Platform — Authorized personnel only." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan:   #00e5ff;
      --purple: #7c3aed;
      --pink:   #ec4899;
      --bg:     #050814;
      --surface:rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.1);
      --text:   #e2e8f0;
      --muted:  #64748b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .blob {
      position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none;
      opacity: 0.12;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--purple); top: -100px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--cyan); bottom: -100px; right: -100px; }

    .login-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      padding: 1rem;
    }

    /* Back link */
    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--muted); font-size: 0.83rem; text-decoration: none;
      margin-bottom: 2rem; transition: color 0.2s;
    }
    .back-link:hover { color: var(--cyan); }

    /* Card */
    .card {
      background: var(--surface);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 0 80px rgba(124,58,237,0.15);
    }

    /* Logo */
    .card-logo {
      text-align: center; margin-bottom: 2rem;
    }
    .card-logo .ghost { font-size: 3rem; filter: drop-shadow(0 0 20px var(--cyan)); }
    .card-logo h1 {
      font-size: 1.4rem; font-weight: 800;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-top: 0.5rem;
    }
    .card-logo p { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; }

    /* Badge */
    .auth-badge {
      display: flex; align-items: center; gap: 0.5rem; justify-content: center;
      background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3);
      border-radius: 999px; padding: 0.35rem 1rem;
      font-size: 0.75rem; font-weight: 600; color: #a78bfa;
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2rem;
    }
    .auth-dot { width: 6px; height: 6px; border-radius: 50%; background: #a78bfa; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.4)} }

    /* Form */
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #94a3b8; margin-bottom: 0.45rem; letter-spacing: 0.04em; text-transform: uppercase; }
    input {
      width: 100%; padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text); font-size: 0.95rem;
      font-family: inherit; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    }
    input::placeholder { color: var(--muted); }

    .btn-submit {
      width: 100%; padding: 0.9rem;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #000; font-weight: 700; font-size: 0.95rem; font-family: inherit;
      border: none; border-radius: 10px; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 0 30px rgba(0,229,255,0.25);
      margin-top: 0.5rem;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .alert {
      padding: 0.85rem 1rem; border-radius: 8px; font-size: 0.85rem;
      margin-top: 1rem; display: none; font-weight: 500;
    }
    .alert.error  { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert.success{ background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }

    .hint-box {
      margin-top: 1.5rem; padding: 0.9rem;
      background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.15);
      border-radius: 8px; font-size: 0.78rem; font-family: 'JetBrains Mono', monospace;
      color: var(--muted); line-height: 1.8;
    }
    .hint-box span { color: var(--cyan); }

    .footer-note { text-align: center; font-size: 0.75rem; color: var(--muted); margin-top: 1.5rem; }
    .footer-note a { color: var(--muted); text-decoration: none; }
    .footer-note a:hover { color: var(--cyan); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-container">
    <a href="/" class="back-link">← Back to PhantomIDS</a>

    <div class="card">
      <div class="card-logo">
        <div class="ghost">👻</div>
        <h1>PhantomIDS</h1>
        <p>Security Intelligence Platform</p>
      </div>

      <div class="auth-badge">
        <div class="auth-dot"></div>
        Authorized Personnel Only
      </div>

      <form id="admin-login-form">
        <div class="form-group">
          <label for="admin-username">Username</label>
          <input type="text" id="admin-username" name="username" placeholder="Enter admin username" autocomplete="off" required />
        </div>
        <div class="form-group">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" name="password" placeholder="Enter password" required />
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Access Dashboard →</button>
      </form>

      <div class="alert" id="alert-box"></div>

      <div class="hint-box">
        <span>Demo credentials:</span><br/>
        Username: <span>phantom_admin</span><br/>
        Password: <span>PhantomAdmin@2024</span>
      </div>

      <div class="footer-note">
        <a href="/honeypot">View Honeypot Trap</a> &nbsp;·&nbsp; 
        <a href="/">Home</a>
      </div>
    </div>
  </div>

  <script>
    // If already logged in, redirect
    fetch('/admin/me').then(r => r.json()).then(data => {
      if (data.authenticated) window.location.href = '/dashboard';
    }).catch(() => {});

    const form = document.getElementById('admin-login-form');
    const alert = document.getElementById('alert-box');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value;

      btn.disabled = true;
      btn.textContent = 'Authenticating...';
      hideAlert();

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          showAlert('success', `✅ Welcome, ${data.admin.username}! Redirecting to dashboard...`);
          setTimeout(() => { window.location.href = '/dashboard'; }, 1200);
        } else {
          showAlert('error', `❌ ${data.message}`);
          btn.disabled = false;
          btn.textContent = 'Access Dashboard →';
        }
      } catch (err) {
        showAlert('error', '⚠ Connection error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Access Dashboard →';
      }
    });

    function showAlert(type, msg) {
      alert.className = `alert ${type}`;
      alert.style.display = 'block';
      alert.textContent = msg;
    }
    function hideAlert() {
      alert.style.display = 'none';
    }
  </script>
</body>
</html>
