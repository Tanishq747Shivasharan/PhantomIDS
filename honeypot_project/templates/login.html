<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CorpNet Employee Portal — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-wrapper {
      background: #ffffff;
      border-radius: 8px;
      padding: 40px 36px;
      width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .company-logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .company-logo .logo-text {
      font-size: 22px;
      font-weight: bold;
      color: #0d3b66;
      letter-spacing: 1px;
    }

    .company-logo .logo-sub {
      font-size: 12px;
      color: #666;
      margin-top: 3px;
    }

    h2 {
      font-size: 17px;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
      font-weight: normal;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #0d3b66;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #0d3b66;
      color: white;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: #0a2d50;
    }

    .message {
      margin-top: 16px;
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 13px;
      text-align: center;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 11px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="login-wrapper">

  <div class="company-logo">
    <div class="logo-text">CORPNET</div>
    <div class="logo-sub">Employee Portal v2.1</div>
  </div>

  <h2>Sign in to your account</h2>

  <form method="POST" action="/login">
    <label for="username">Username</label>
    <input
      type="text"
      id="username"
      name="username"
      placeholder="Enter your username"
      autocomplete="off"
    >

    <label for="password">Password</label>
    <input
      type="password"
      id="password"
      name="password"
      placeholder="Enter your password"
    >

    <button type="submit">Login</button>
  </form>

  {% if message %}
    <div class="message {% if 'Welcome' in message %}success{% else %}error{% endif %}">
      {{ message }}
    </div>
  {% endif %}

  <div class="footer-note">
    Authorized personnel only. All access is monitored and logged.
  </div>

</div>

</body>
</html>
